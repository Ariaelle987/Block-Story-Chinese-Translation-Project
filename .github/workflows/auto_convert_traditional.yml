name: 生成繁体版本

on:
  push:
    branches: [ main ]
    paths:
      - '*.txt'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  convert:
    runs-on: ubuntu-latest
    
    steps:
    - name: 获取代码
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
        token: ${{ secrets.GITHUB_TOKEN }}
    
    - name: 设置 Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
    
    - name: 安装转换工具
      run: pip install opencc-python-reimplemented
    
    - name: 转换简体到繁体（含用语本地化）
      run: |
        python -c "
        import os
        import glob
        import re
        from opencc import OpenCC
        
        TERMS = {
            '回复': '回覆',
            '血量': '生命值',
            '魔法': '魔力',
            '经验': '經驗值',
            '装备': '裝備',
            '道具': '物品',
            '商店': '商店',
            '金币': '金幣',
            '钻石': '鑽石',
            '设置': '設定',
            '菜单': '選單',
            '保存': '儲存',
            '加载': '載入',
            '退出': '離開',
            '任务': '任務',
            '奖励': '獎勵',
            '获得': '獲得',
            '攻击': '攻擊',
            '防御': '防禦',
            '伤害': '傷害',
            '暴击': '暴擊',
            '闪避': '閃避',
            '命中': '命中',
            '服务器': '伺服器',
            '在线': '線上',
            '离线': '離線',
            '延迟': '延遲',
            '账号': '帳號',
            '登录': '登入',
            '注册': '註冊',
            '沙漠': '沙漠',
            '海洋': '海洋',
            '村庄': '村莊',
            '城镇': '城鎮',
            '沼泽': '沼澤',
            '战士': '戰士',
            '法师': '法師',
            '牧师': '牧師',
            '药水': '藥水',
            '卷轴': '卷軸',
            '配方': '配方',
            '合成': '合成',
            '默认': '預設',
            '创建': '建立',
            '删除': '刪除',
            '搜索': '搜尋',
            '刷新': '重新整理',
            '备份': '備份',
            '缓存': '快取',
            '宇航员': '太空人',
            '宇航服': '太空衣',
            '司机': '駕駛者',
            '垃圾收集者': '垃圾回收者',
            '真正的魔力': '真正的魔法',
            '旧食谱': '古老配方',
            '淘气圣诞节': '搗蛋聖誕節',
            '骷髅骨': '骷髏',
            '轻视': '小覷',
            '旅行者': '旅人',
            '太空的花朵': '太空花朵',
            '法力药水': '魔力藥水',
            '火炬': '壁掛火把',
            '烧鱼': '烤魚',
            '生命之源': '生命之源',
            '刷怪箱': '生怪磚',
            '法力值': '魔力值',
            '潜水服': '潛水衣',
            '呼吸值': '氧氣值',
            '难得素': '罕有素',
            '配方书': '配方書',
            '传送器': '傳送杖',
            '雷龙': '雷龍',
            '大锅': '大鍋',
            '炼金术士': '鍊金術士',
            '魔力师': '巫師',
            '工作台': '工作臺',
            '琥珀砖': '琥珀磚',
            '冰城': '冰城',
            '外来者': '來訪者',
            '熟肉': '烤肉',
        }
        
        TERMS_LIST = sorted(TERMS.items(), key=lambda x: len(x[0]), reverse=True)
        
        def localize_text(text):
            for simplified, traditional in TERMS_LIST:
                text = text.replace(simplified, traditional)
            return text
        
        cc = OpenCC('s2tw')
        os.makedirs('Traditional_TW', exist_ok=True)
        
        converted_count = 0
        for file in glob.glob('*.txt'):
            if file in ['check_translation.py']:
                continue
            try:
                with open(file, 'r', encoding='utf-8') as f:
                    content = f.read()
                converted = cc.convert(content)
                converted = localize_text(converted)
                output_path = f'Traditional_TW/{file}'
                with open(output_path, 'w', encoding='utf-8') as f:
                    f.write(converted)
                converted_count += 1
                print(f'已转换: {file}')
            except Exception as e:
                print(f'转换失败 {file}: {e}')
        
        print(f'转换完成！共转换 {converted_count} 个文件')
        "
    
    - name: 提交到繁体分支
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        
        if git ls-remote --heads origin traditional-chinese | grep traditional-chinese; then
          echo "分支存在，切换到 traditional-chinese"
          git checkout traditional-chinese
        else
          echo "分支不存在，创建 traditional-chinese"
          git checkout -b traditional-chinese
        fi
        
        cp Traditional_TW/* ./
        rm -rf Traditional_TW
        
        git add *.txt
        
        if git diff --staged --quiet; then
          echo "没有变更需要提交"
        else
          git commit -m "自动更新繁体版本（含用语本地化）"
          git push origin traditional-chinese
          echo "推送成功！"
        fi
