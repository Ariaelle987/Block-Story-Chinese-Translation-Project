name: 生成繁体版本

on:
  push:
    branches: [ main ]
    paths:
      - '*.txt'
  workflow_dispatch:

permissions:
  contents: write  # 添加写入权限

jobs:
  convert:
    runs-on: ubuntu-latest
    
    steps:
    - name: 获取代码
      uses: actions/checkout@v4  # 升级到 v4
      with:
        fetch-depth: 0
        token: ${{ secrets.GITHUB_TOKEN }}  # 使用 token
    
    - name: 设置 Python
      uses: actions/setup-python@v5  # 升级到 v5
      with:
        python-version: '3.10'
    
    - name: 安装转换工具
      run: pip install opencc-python-reimplemented
    
    - name: 转换简体到繁体
      run: |
        python -c "
        import os
        import glob
        from opencc import OpenCC
        
        # 创建临时文件夹
        os.makedirs('Traditional_TW', exist_ok=True)
        
        # 转换所有txt文件
        cc = OpenCC('s2tw')
        for file in glob.glob('*.txt'):
            if file in ['check_translation.py']:
                continue
            try:
                with open(file, 'r', encoding='utf-8') as f:
                    content = f.read()
                converted = cc.convert(content)
                output_path = f'Traditional_TW/{file}'
                with open(output_path, 'w', encoding='utf-8') as f:
                    f.write(converted)
                print(f'已转换: {file}')
            except Exception as e:
                print(f'转换失败 {file}: {e}')
        print('转换完成！')
        "
    
    - name: 提交到繁体分支
      run: |
        # 设置 Git
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        
        # 检查 traditional-chinese 分支是否存在
        if git ls-remote --heads origin traditional-chinese | grep traditional-chinese; then
          echo "分支存在，切换到 traditional-chinese"
          git checkout traditional-chinese
        else
          echo "分支不存在，创建 traditional-chinese"
          git checkout -b traditional-chinese
        fi
        
        # 把繁体文件移到根目录
        cp Traditional_TW/* ./
        rm -rf Traditional_TW
        
        # 添加所有txt文件
        git add *.txt
        
        # 检查是否有变更
        if git diff --staged --quiet; then
          echo "没有变更需要提交"
        else
          git commit -m "自动更新繁体版本"
          git push origin traditional-chinese
          echo "推送成功！"
        fi
